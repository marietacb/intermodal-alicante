<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Monitorización Colector - Intermodal Alicante</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg:       #ffffff;
    --bg2:      #f1f5f9;
    --bg3:      #e2e8f0;
    --text:     #0f172a;
    --text2:    #475569;
    --border:   #cbd5e1;
    --accent:   #3b82f6;
    --shadow:   0 2px 8px rgba(0,0,0,.08);
    --radius:   10px;
  }
  body.dark {
    --bg:       #0f172a;
    --bg2:      #1e293b;
    --bg3:      #334155;
    --text:     #f1f5f9;
    --text2:    #94a3b8;
    --border:   #334155;
    --shadow:   0 2px 12px rgba(0,0,0,.4);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background .25s, color .25s;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow);
    gap: 12px; flex-wrap: wrap;
  }
  .header-left { display:flex; align-items:center; gap:12px; }
  .logo { font-size:1.25rem; font-weight:700; letter-spacing:-.5px; }
  .logo span { color: var(--accent); }
  .subtitle { font-size:.8rem; color: var(--text2); }

  /* ── TOGGLE dark/light ── */
  .toggle-btn {
    display:flex; align-items:center; gap:8px;
    background: var(--bg3); border:none; border-radius:20px;
    padding:6px 14px; cursor:pointer; color:var(--text);
    font-size:.85rem; font-weight:600; transition: background .2s;
  }
  .toggle-btn:hover { background: var(--accent); color:#fff; }
  .toggle-icon { font-size:1rem; }

  /* ── MAIN LAYOUT ── */
  .container { display:flex; height: calc(100vh - 64px); }

  /* ── SIDEBAR ── */
  aside {
    width: 240px; min-width:200px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y:auto; padding:16px 12px;
    display:flex; flex-direction:column; gap:16px;
  }
  .group-title {
    font-size:.7rem; font-weight:700; text-transform:uppercase;
    letter-spacing:.08em; color:var(--text2); padding:4px 4px 2px;
    border-bottom:1px solid var(--border); margin-bottom:4px;
  }
  .sensor-item {
    display:flex; align-items:center; gap:8px;
    padding:6px 8px; border-radius:6px; cursor:pointer;
    user-select:none; transition:background .15s;
  }
  .sensor-item:hover { background:var(--bg3); }
  .sensor-item.active { background:var(--bg3); }
  .swatch {
    width:12px; height:12px; border-radius:50%;
    flex-shrink:0; border:2px solid transparent;
    transition:opacity .2s;
  }
  .sensor-item.disabled .swatch { opacity:.3; }
  .sensor-item.disabled .slabel { opacity:.4; }
  .slabel { font-size:.83rem; line-height:1.3; }
  .sunit { font-size:.72rem; color:var(--text2); }

  .select-btns {
    display:flex; gap:6px; flex-wrap:wrap; padding: 0 4px;
  }
  .sel-btn {
    font-size:.72rem; padding:3px 9px; border-radius:12px;
    border:1px solid var(--border); background:transparent;
    color:var(--text2); cursor:pointer; transition:background .15s;
  }
  .sel-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* ── CHART AREA ── */
  main {
    flex:1; overflow-y:auto; padding:20px;
    display:flex; flex-direction:column; gap:20px;
  }

  .chart-card {
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 18px;
    box-shadow:var(--shadow);
  }
  .chart-card h3 {
    font-size:.9rem; font-weight:600; color:var(--text2);
    margin-bottom:12px; text-transform:uppercase; letter-spacing:.06em;
  }
  .chart-wrap { position:relative; height:220px; }
  .empty-msg {
    text-align:center; color:var(--text2); font-size:.85rem;
    padding:40px 0;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display:flex; gap:10px; flex-wrap:wrap; margin-bottom:4px;
  }
  .stat-chip {
    background:var(--bg3); border-radius:6px; padding:4px 10px;
    font-size:.75rem; color:var(--text2);
  }
  .stat-chip b { color:var(--text); }

  /* ── ZOOM / PAN note ── */
  .hint {
    font-size:.72rem; color:var(--text2); text-align:right;
    padding-top:4px;
  }
  
  @media(max-width:640px){
    .container { flex-direction:column; height:auto; }
    aside { width:100%; border-right:none; border-bottom:1px solid var(--border); }
    main { padding:12px; }
    .chart-wrap { height:180px; }
  }
</style>
</head>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
// Vaciamos los datos estáticos porque ahora vienen de la base de datos
const RAW = []; 

// Mapeo automático de las columnas reales de tu CSV a los gráficos
const SENSORS = [
  { "key": "S1_CH1_T_273901_0001", "label": "S1 Temperatura", "unit": "°C", "group": "temp", "color": "#ef4444" }, 
  { "key": "S2_CH1_T_273902_0001", "label": "S2 Temperatura", "unit": "°C", "group": "temp", "color": "#f97316" }, 
  { "key": "S3_CH1_T_273904_0002", "label": "S3 Temperatura", "unit": "°C", "group": "temp", "color": "#eab308" }, 
  { "key": "S1_CH1_LG_273901_0001", "label": "S1 Microdeformación", "unit": "µε", "group": "strain", "color": "#3b82f6" }, 
  { "key": "S2_CH1_LG_273902_0001", "label": "S2 Microdeformación", "unit": "µε", "group": "strain", "color": "#8b5cf6" }, 
  { "key": "S3_CH1_LG_273904_0002", "label": "S3 Microdeformación", "unit": "µε", "group": "strain", "color": "#06b6d4" }, 
  { "key": "S7_CH3_CL_242474_0001", "label": "S7 Inclinación", "unit": "°", "group": "tilt", "color": "#10b981" }, 
  { "key": "S8_CH3_CL_227745_0002", "label": "S8 Inclinación", "unit": "°", "group": "tilt", "color": "#f43f5e" }
];

// ── STATE ─────────────────────────────────────────────────────────────
let darkMode = false;
let active = new Set(SENSORS.map(s => s.key));
let charts = {};

// ── THEME ─────────────────────────────────────────────────────────────
function toggleTheme() {
  darkMode = !darkMode;
  document.body.classList.toggle('dark', darkMode);
  document.getElementById('themeIcon').textContent  = darkMode ? '☀️' : '🌙';
  document.getElementById('themeLabel').textContent = darkMode ? 'Fondo claro' : 'Fondo oscuro';
  rebuildAll();
}

function gridColor() { return darkMode ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.06)'; }
function tickColor()  { return darkMode ? '#94a3b8' : '#64748b'; }
function tooltipBg()  { return darkMode ? '#1e293b' : '#ffffff'; }
function tooltipTxt() { return darkMode ? '#f1f5f9' : '#0f172a'; }

// ── SIDEBAR ───────────────────────────────────────────────────────────
function buildSidebar() {
  const groups = [
    { id:'temp',   label:'Temperatura',     icon:'🌡' },
    { id:'strain', label:'Microdeformación',icon:'📐' },
    { id:'tilt',   label:'Inclinación',     icon:'📏' },
  ];
  const list = document.getElementById('sensorList');
  list.innerHTML = '';
  groups.forEach(g => {
    const grpSensors = SENSORS.filter(s => s.group === g.id);
    const wrap = document.createElement('div');
    const title = document.createElement('div');
    title.className = 'group-title';
    title.textContent = g.icon + ' ' + g.label;
    wrap.appendChild(title);
    grpSensors.forEach(s => {
      const item = document.createElement('div');
      item.className = 'sensor-item' + (active.has(s.key) ? '' : ' disabled');
      item.id = 'si-' + s.key;
      item.innerHTML = `<div class="swatch" style="background:${s.color};border-color:${s.color}"></div>
        <div><div class="slabel">${s.label}</div><div class="sunit">${s.unit}</div></div>`;
      item.onclick = () => toggleSensor(s.key);
      wrap.appendChild(item);
    });
    list.appendChild(wrap);
  });
}

function toggleSensor(key) {
  if (active.has(key)) active.delete(key); else active.add(key);
  document.getElementById('si-' + key)?.classList.toggle('disabled', !active.has(key));
  rebuildAll();
}

function selectGroup(g) {
  if (g === 'all')  SENSORS.forEach(s => active.add(s.key));
  else if (g === 'none') active.clear();
  else {
    SENSORS.filter(s => s.group === g).forEach(s => active.add(s.key));
    SENSORS.filter(s => s.group !== g).forEach(s => active.delete(s.key));
  }
  buildSidebar();
  rebuildAll();
}

// ── DATOS DESDE API ────────────────────────────────────────────────────
let RAW_API = null;

function updateCharts(apiRows) {
  const sensorKeys = [...new Set(SENSORS.map(s => s.key))];
  RAW_API = (apiRows || []).map(r => {
    // Aquí cogemos r.timestamp (del CSV/BD) y lo guardamos como 'tiempo'
    const obj = { tiempo: r.timestamp ?? r.tiempo ?? null };
    sensorKeys.forEach(k => { obj[k] = (k in r) ? r[k] : null; });
    return obj;
  });
}

async function fetchAndUpdate() {
  try {
    const res = await fetch('/datos'); // Llama al endpoint de Flask
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const payload = await res.json();
    const apiRows = Array.isArray(payload) ? payload : (payload?.lecturas ?? []);
    updateCharts(apiRows);
    rebuildAll();
  } catch (err) {
    console.error('Error al cargar datos desde /datos:', err);
  }
}

// ── STATS ─────────────────────────────────────────────────────────────
function buildStats(group) {
  const el = document.getElementById('stats-' + group);
  const sens = SENSORS.filter(s => s.group === group && active.has(s.key));
  if (!sens.length) { el.innerHTML=''; return; }
  const source = (RAW_API ?? RAW);
  
  if (!source || source.length === 0) {
      el.innerHTML = '<div class="stat-chip">Esperando datos...</div>';
      return;
  }

  el.innerHTML = sens.map(s => {
    const vals = source.map(r => r[s.key]).filter(v => v !== null && !isNaN(v));
    if (!vals.length) {
      return `<div class="stat-chip" style="border-left:3px solid ${s.color}">
        <b>${s.label.split(' ')[0]}</b> sin datos ${s.unit}</div>`;
    }
    const mn = Math.min(...vals).toFixed(4);
    const mx = Math.max(...vals).toFixed(4);
    const rng = (Math.max(...vals) - Math.min(...vals)).toFixed(4);
    return `<div class="stat-chip" style="border-left:3px solid ${s.color}">
      <b>${s.label.split(' ')[0]}</b> min ${mn} · max ${mx} · Δ${rng} ${s.unit}</div>`;
  }).join('');
}

// ── CHART BUILDER ─────────────────────────────────────────────────────
function makeChart(canvasId, group) {
  if (charts[canvasId]) { charts[canvasId].destroy(); }

  const sens = SENSORS.filter(s => s.group === group && active.has(s.key));
  const canvas = document.getElementById(canvasId);

  if (!sens.length) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    return;
  }

  const source = (RAW_API ?? RAW);
  const labels = source.map(r => new Date(r.tiempo));
  const datasets = sens.map(s => ({
    label: s.label + ' (' + s.unit + ')',
    data: source.map((r,i) => ({ x: labels[i], y: r[s.key] })),
    borderColor: s.color,
    backgroundColor: s.color + '18',
    borderWidth: 1.5,
    pointRadius: 0,
    pointHoverRadius: 4,
    tension: 0.2,
    fill: false,
  }));

  const yUnit = sens[0]?.unit ?? '';
  charts[canvasId] = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: {
          labels: { color: tickColor(), font:{ size:11 }, boxWidth:12, padding:14 },
        },
        tooltip: {
          backgroundColor: tooltipBg(),
          titleColor: tooltipTxt(),
          bodyColor: tooltipTxt(),
          borderColor: gridColor(),
          borderWidth: 1,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(4)}`
          }
        },
      },
      scales: {
        x: {
          type: 'time',
          time: { tooltipFormat:'dd/MM HH:mm', displayFormats:{ day:'dd MMM', hour:'dd/MM HH:mm' } },
          ticks: { color: tickColor(), maxTicksLimit:8, font:{size:10} },
          grid: { color: gridColor() },
        },
        y: {
          ticks: { color: tickColor(), font:{size:10}, callback: v => v.toFixed(3)+' '+yUnit },
          grid: { color: gridColor() },
        }
      }
    }
  });
}

// ── REBUILD ALL ───────────────────────────────────────────────────────
function rebuildAll() {
  ['temp','strain','tilt'].forEach(g => {
    buildStats(g);
    makeChart('chart-' + g, g);
  });
}

// ── INIT ──────────────────────────────────────────────────────────────
buildSidebar();
rebuildAll();
fetchAndUpdate();

// Refrescar automáticamente los datos cada 60 segundos (60000 ms)
setInterval(fetchAndUpdate, 60_000);
</script>
